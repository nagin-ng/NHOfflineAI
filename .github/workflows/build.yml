name: Build NHOfflineAI APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;29.0.13113456"
      - name: Install CMake
        run: echo "y" | sdkmanager "cmake;3.22.1"
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NHOfflineAI-debug-apk
          path: app/build/outputs/apk/debug/*.apk
